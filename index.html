<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>TodoList | Abhiram</title>
</head>
<body>
    <section id="todo">
        <h1>Todo List</h1>
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="🎯 what's today?" required>
            <input type="submit" id="new-task-submit" value="Add task"/>
        </form>
        <ul id="todo-list"></ul>

        <!-- Container to display added tasks -->
        <div id="outputContainer"></div>

        <section>
            <section class="task-list">
                <div id="tasks">
                </div>
            </section>
        </section>

        <script src="app.js"></script>
    </section>
</body>
</html>
